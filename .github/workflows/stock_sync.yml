name: "Stok Senkronizasyonu (2 saatte bir)"

on:
  schedule:
    # Her 2 saatte bir, 03:00-20:00 UTC (TR 06:00-23:00)
    - cron: "0 3,5,7,9,11,13,15,17,19 * * *"
  workflow_dispatch:

jobs:
  stock-sync:
    name: Stok Sync
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Stok sync çalıştır
        env:
          TRENDYOL_SUPPLIER_ID:  ${{ secrets.TRENDYOL_SUPPLIER_ID }}
          TRENDYOL_API_KEY:      ${{ secrets.TRENDYOL_API_KEY }}
          TRENDYOL_API_SECRET:   ${{ secrets.TRENDYOL_API_SECRET }}
          TRENDYOL_TOKEN:        ${{ secrets.TRENDYOL_TOKEN }}
          SHOPIFY_STORE_URL:     ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN:  ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          CURRENCY_API_KEY:      ${{ secrets.CURRENCY_API_KEY }}
        run: python scheduler.py --task stock_sync

      - name: State'i kaydet
        run: |
          git config user.name  "Limsa Bot"
          git config user.email "bot@limsa.club"
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: stok state güncelle [skip ci]"
          git push || true
