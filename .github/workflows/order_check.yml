name: "Sipariş Kontrolü (30 dakikada bir)"

on:
  schedule:
    # UTC saati — Türkiye UTC+3, yani 06:00-23:00 TR = 03:00-20:00 UTC
    # Her 30 dakikada bir, 03:00-20:00 UTC arası (TR sabah 6 - gece 11)
    - cron: "0,30 3-20 * * *"
  workflow_dispatch:   # Manuel tetikleme

jobs:
  order-sync:
    name: Sipariş Sync
    runs-on: ubuntu-latest
    permissions:
      contents: write    # state.json güncellemesi için

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sipariş sync çalıştır
        env:
          TRENDYOL_SUPPLIER_ID:  ${{ secrets.TRENDYOL_SUPPLIER_ID }}
          TRENDYOL_API_KEY:      ${{ secrets.TRENDYOL_API_KEY }}
          TRENDYOL_API_SECRET:   ${{ secrets.TRENDYOL_API_SECRET }}
          TRENDYOL_TOKEN:        ${{ secrets.TRENDYOL_TOKEN }}
          SHOPIFY_STORE_URL:     ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN:  ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_SENDER:          ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_REPORT_RECIPIENT: ${{ secrets.GMAIL_REPORT_RECIPIENT }}
        run: python scheduler.py --task order_sync

      - name: Telegram komutlarını işle
        env:
          TRENDYOL_SUPPLIER_ID:  ${{ secrets.TRENDYOL_SUPPLIER_ID }}
          TRENDYOL_API_KEY:      ${{ secrets.TRENDYOL_API_KEY }}
          TRENDYOL_API_SECRET:   ${{ secrets.TRENDYOL_API_SECRET }}
          TRENDYOL_TOKEN:        ${{ secrets.TRENDYOL_TOKEN }}
          SHOPIFY_STORE_URL:     ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN:  ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          STRIPE_SECRET_KEY:     ${{ secrets.STRIPE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scheduler.py --task telegram

      - name: State'i kaydet (git commit)
        run: |
          git config user.name  "Limsa Bot"
          git config user.email "bot@limsa.club"
          git add data/state.json data/exchange_rates.json || true
          git diff --staged --quiet || git commit -m "chore: state güncelle [skip ci]"
          git push || true
